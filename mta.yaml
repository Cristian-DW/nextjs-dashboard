_schema-version: '3.1'
ID: deltux-pos
version: 1.0.0
description: "Deltux POS: Next.js UI with SAP CAP Backend"
parameters:
  enable-parallel-deployments: true


modules:
  # --------------------- APPROUTER -------------------------
  - name: deltux-pos-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 128M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: ui-api
        group: destinations
        properties:
          name: ui-api
          url: ~{ui-url}
          forwardAuthToken: true

  # --------------------- CAP BACKEND ---------------------
  - name: deltux-pos-srv
    type: nodejs
    path: cap-backend
    parameters:
      memory: 256M
      disk-quota: 512M
    properties:
      # Expects POSTGRES_URL to be set via CLI after deploy or via MTA-EXT
      POSTGRES_URL: ${POSTGRES_URL}
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # --------------------- NEXT.JS FRONTEND ---------------------
  - name: deltux-pos-ui
    type: nodejs
    path: .
    parameters:
      memory: 512M
      disk-quota: 1024M
    properties:
      POSTGRES_URL: ${POSTGRES_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    build-parameters:
      builder: custom
      build-result: .next/standalone
      commands:
        - npm install
        - npm run build
        - cp -r public .next/standalone/
        - mkdir -p .next/standalone/.next/static
        - cp -r .next/static .next/standalone/.next/
    provides:
      - name: ui-api
        properties:
          ui-url: ${default-url}
    requires:
      - name: srv-api
        properties:
          CAP_URL: ~{srv-url}
